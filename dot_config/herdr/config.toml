# Written back by herdr itself after the first-run notification prompt.
onboarding = false

[theme]
# Match the rest of the environment: wezterm Kanagawa Dragon, nvim kanagawa.
name = "kanagawa"

[ui]
# tmux: prefix+c creates a window immediately; skip herdr's tab-name prompt
# (tabs get generated names, rename later with prefix+shift+t).
prompt_new_tab_name = false

# Show detected agent names (claude, etc.) on split pane borders — the herdr
# counterpart of the tmux window-status Claude glyphs: see what runs where.
show_agent_labels_on_pane_borders = true

[ui.toast]
# Route notifications to macOS itself (terminal-notifier, else osascript)
# instead of in-UI toasts, so background-agent pings surface even when
# herdr is hidden behind other windows.
delivery = "system"

[keys]
# Aligned with the tmux bindings (see dot_tmux.conf) so muscle memory carries
# over. herdr defaults that already match tmux are not repeated here:
# pane nav prefix+h/j/k/l, new tab prefix+c, next/prev tab prefix+n/p,
# picker prefix+w, zoom prefix+z, close pane prefix+x.
# When herdr runs INSIDE tmux, tmux eats C-q first — press C-q C-q
# (send-prefix) to reach herdr.
prefix = "ctrl+q"

# tmux: C-q d detaches (herdr default was prefix+q).
detach = "prefix+d"

# tmux: C-q r reloads the config; resize moves to shift+r (tmux used
# H/J/K/L repeat-resize, which herdr models as a resize MODE instead).
reload_config = "prefix+r"
resize_mode = "prefix+shift+r"

# tmux: C-q " splits below, C-q % splits right.
split_horizontal = 'prefix+"'
split_vertical = "prefix+%"

# herdr's built-in goto picker, at its default spot; bare C-g goes to the
# fzf+ghq launcher below instead (tmux muscle memory).
goto = "prefix+g"

# Cycle workspaces with prefix+arrow (unset in herdr by default), matching
# the sidebar's vertical workspace list. Note in tmux prefix+up/down means
# select-pane — here it moves whole workspaces.
previous_workspace = "prefix+up"
next_workspace = "prefix+down"

# ghq repo launcher on bare C-g, same as the tmux session selector: jump to
# an open workspace or create one from a ghq repo. Inside tmux, tmux's own
# C-g binding wins — this applies when herdr runs directly in the terminal.
[[keys.command]]
key = "ctrl+g"
type = "pane"
command = "~/.local/bin/herdr-repo-selector"

[experimental]
# While prefix mode is active, flip the macOS input source to an ASCII
# layout and restore it after, so C-q commands register even with the
# Japanese IME on. macOS-only, best-effort.
switch_ascii_input_source_in_prefix = true
